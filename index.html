<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CSV Converter</title>
        <link rel="icon" type="image" href="images/redleaf.png" />
        <link rel="stylesheet" href="index.css"/>        
        <script src="index.js"></script>
    </head>

    <body>
        <div id="leaves" class="leaves"></div>

        <div id="ravens" class="leaves" style="display: none;"></div>

        <div id="christmas" class="leaves" style="display: none;"></div>

        <div class="dropdown" id="dropdown">
            <button id="FelloButton" class="dropbtn">Theme</button>

            <div class="dropdown-content"></div>
        </div>
            
        <iframe 
            src="https://giphy.com/embed/jbN8TR74FTLb2" 
            width="240" 
            height="175" 
            style="display: none; border-radius: 30px; position: absolute; top: 8px; left: 0" 
            frameBorder="0" 
            class="giphy-embed" 
            allowFullScreen
        >
        </iframe>

        <iframe 
            src="https://giphy.com/embed/fsnzYr1pgvAQM" 
            width="240" 
            height="175" 
            style="display: none; border-radius: 30px; position: absolute; top: 0; right: 0" 
            frameBorder="0" 
            class="giphy-embed" 
            allowFullScreen
        >
        </iframe>

        <div id="felloButtons" style="display: flex; justify-content: center; align-items: center; height: 35px;">            
            <a 
                href="https://ims.fello.com/items/list" 
                target="_blank" 
                rel="noopener noreferrer" 
                style="text-decoration: none; display: flex; justify-content: center; line-height: 30px;"
            >
                <h4 id="FelloButton" style="background-color: white; color: black; width: 30px; height: 30px; margin-left: 15px; border-radius: 16px; text-align: center;">I.M.</h4>
            </a>

            <a 
                style="margin-top: 4px; margin-left: 10px; margin-right: 10px;" 
                href="https://ims.fello.com" 
                target="_blank" 
                rel="noopener noreferrer"
            >
                <img id="FelloButton" class="fello" style="width: 30px; height: 30px; border-radius: 16px;" src="images/Fello.png">
            </a>

            <a 
                style="margin-top: 4px; margin-right: 10px;" 
                href="https://thingspace.verizonwireless.com/Portal/manage/dashboard" 
                target="_blank" 
                rel="noopener noreferrer"
            >
                <img id="FelloButton" class="fello" src="images/verizon.jpg" style="border-radius: 16px;">
            </a>

            <a 
                style="margin-top: 4px; margin-right: 10px;" 
                href="https://business.apple.com/#/main/users" 
                target="_blank" 
                rel="noopener noreferrer"
            >
                <img id="FelloButton" class="fello" src="images/apple.png" style="border-radius: 16px;">
            </a>

            <a 
                href="https://a.simplemdm.com/admin/v2/devices?group=&order=&orderD=desc&page=0&per=100&saveQuery=true&search=" 
                target="_blank" 
                rel="noopener noreferrer"
            >
                <img id="FelloButton" class="fello" src="images/mdm.png" style="border-radius: 16px; margin-top: 4px;">
            </a>
            
            <br>

            <a 
                href="https://ims.fello.com/reports" 
                target="_blank" 
                rel="noopener noreferrer" 
                style="text-decoration: none; display: flex; justify-content: center; line-height: 30px;"
            >
                <h4 id="FelloButton" style="background-color: white; color: black; width: 30px; height: 30px; margin-left: 10px; border-radius: 16px; text-align: center;">R</h4>
            </a> 
        </div>

        <div 
            class="blob" 
            style="margin: 10px auto;" 
        >
            <a href="https://my.iamwebbing.com/pages/dashboards/customers.aspx" target="_blank" rel="noopener noreferrer" >
                <img src="images/webbing.png" style="width: 130px; height: 50px; margin-left: 5px;">
            </a>
        </div>                  
            
        <div id="snackbar">Copied to clipboard</div>
        <!-- Duplicate feature -->
        <div id="snackbar2">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <img src="images/copy.png" class="textButton" onclick="copyCSV(boxxxx)" style="width: 30px; height: 30px;">

                <img src="images/close.png" id="snackButton" class="textButton" style="width: 30px; height: 30px;"">
            </div>
            
            Duplicates found
            <br>
            <br>
            <textarea id="boxxxx" style="display: flex; justify-content: center; align-items: center;" ></textarea>
        </div>
        
        <div id="added">+1 Added</div>

        <div id="removed">-1 Removed</div>

        <div id="newButtonCont2" style="display: flex; justify-content: center; align-items: center; margin-bottom: 13px; gap: 40px; margin-left: auto; margin-right: auto;">
            <img src="images/hashtag.png" id="addOrderButton" class="textButton" style="border-radius: 24px;" onclick="addOrders()">

            <img src="images/add.png" id="createFormButton" class="textButton" style="border-radius: 24px;" onclick="createForm()">

            <img src="images/hide.png" id="removebutton" class="textButton" onclick="hideRemoval()">
        </div>                
        
        <div id="magic" style="display: flex; justify-content: space-evenly; flex-wrap: wrap;">
            
            <div class="node0" style="margin-top: 25px; animation: fadeIn 1.5s;">
                <div class="info">
                    <label for="order"><b>Order# </b></label><br>

                    <input type="text" name="order" id="order" placeholder="SQ1234"><br>

                    <div class="newButtonCont" style="display: flex;background: white; width: 296px; justify-content: space-between; border-radius: 16px;">
                        <img id="textButton" src="images/clear.png" class="textButton" onclick="eraseText(box,boxx,order)">

                        <img id="textButton" src="images/edit.png" class="textButton" onclick="openLink(order, 'edit')">

                        <img id="textButton" src="images/checkout.png" class="textButton" onclick="openLink(order, 'checkout')">

                        <img id="textButton" src="images/copy.png" class="textButton" onclick="copyCSV(boxx)">

                        <img class="textButton" src="images/mdm.png" style="border-radius: 16px;" onclick="openLink(order, 'mdm')">
                    </div>                
                </div>
                
                <div style="display: flex; margin: 0px; padding: 0px;">
                    <textarea id="box" cols="20" rows="30" placeholder="Enter (or paste) your column of data here"></textarea>

                    <textarea id="boxx" cols="20" rows="30"  placeholder="Your comma separated list of data will appear here"></textarea>

                    <div id="removal">
                        <div class="newButtonCont" style="display: flex;background: white; width: 166px; justify-content: space-evenly; border-radius: 16px;">
                            <img src="images/clear.png" class="textButton" onclick="eraseText(boxxx)">
                            <img src="images/copy.png" class="textButton" onclick="copyCSV(boxxx)">
                        </div>

                        <textarea id="boxxx" cols="20" rows="30"  placeholder="The FitnessGram™ Pacer Test is a multistage aerobic capacity test that progressively gets 
                        more difficult as it continues. The 20 meter pacer test will begin in 30 seconds. Line up at the start. The running speed starts slowly, but gets 
                        faster each minute after you hear this signal. [beep] A single lap should be completed each time you hear this sound. [ding] Remember to run in a 
                        straight line, and run as long as possible. The second time you fail to complete a lap before the sound, your test is over. The test will begin on 
                        the word start. On your mark, get ready, start." style="height: 600px;"></textarea>

                        <div id="line">
                            <p>Count: </p>

                            <p id="count0"></p>
                        </div>
                    </div>
                </div>
                
                <div id="line">
                    <p>Line Count: </p>

                    <p id="count1"></p>
                </div>                
            </div>
        </div>
        
        <h3 id="emailh">
            <div class="loop-wrapper">
                <div class="mountain"></div>
                <div class="hill"></div>
                <div class="tree1"></div>
                <div class="tree2"></div>
                <div class="tree3"></div>
                <div class="rock"></div>
                <div class="truck"></div>
                <div class="wheels"></div>
            </div> 
        </h3>
    </body>
</html>
